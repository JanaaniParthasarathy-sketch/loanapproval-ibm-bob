[theme]
base            = "light"
primaryColor    = "#1f4e99"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4fb"
textColor       = "#1f2328"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
